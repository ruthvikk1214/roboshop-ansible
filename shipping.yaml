  - name: Configure Shipping Component
    hosts: shipping
    become: yes

    tasks: 

    - name: Maven Installation
      ansible.builtin.dnf:
        name: maven
        state: present
        
    - name: Create roboshop system user
      ansible.builtin.user:
        name: roboshop
        system: yes
        home: /app
        shell: /sbin/nologin
        comment: "roboshop system user"

    - name: Create app directory
      ansible.builtin.file:
        path: /app
        state: directory
        owner: roboshop
        group: roboshop
        mode: '0755'   

    - name: Download the application code
      ansible.builtin.get_url: 
        url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip
        dest: /tmp/shipping.jar

    - name: Unarchive the downloaded content
      ansible.builtin.unarchive:
        src: /tmp/shipping.jar
        dest: /app
        remote_src: yes    

    - name: Build the application
      ansible.builtin.command: mvn clean package
      args:
        chdir: /app

    - name: Rename jar file
      ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar
      args:
        chdir: /app

    - name: Copy the shipping service code
      ansible.builtin.copy:
        src: shipping.service
        dest: /etc/systemd/system/shipping.service

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Start and enable the shipping service
      ansible.builtin.service:
        name: shipping
        enabled: yes
        state: started

    - name: Maven Installation
      ansible.builtin.dnf:
        name: maven
        state: present

    - name: Start and enable the mysql service
      ansible.builtin.service:
        name: mysqld
        enabled: yes
        state: started

    - name: Load schema
      ansible.builtin.shell: >
        mysql -h {{ mysql_host }} -u root -p{{ mysql_root_password }} < /app/db/schema.sql

    - name: Load app user
      ansible.builtin.shell: >
        mysql -h {{ mysql_host }} -u root -p{{ mysql_root_password }} < /app/db/app-user.sql

    - name: Load master data
      ansible.builtin.shell: >
        mysql -h {{ mysql_host }} -u root -p{{ mysql_root_password }} < /app/db/master-data.sql

    - name: restart shipping service
      ansible.builtin.service:
        name: shipping
        state: restarted