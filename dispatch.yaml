  - name: configure dispatch 
    hosts: dispatch
    become: yes

    tasks:

    - name: Install golang
      ansible.builtin.dnf:
        name: golang
        state: present

    - name: Create roboshop system user
      ansible.builtin.user:
        name: roboshop
        system: yes
        home: /app
        shell: /sbin/nologin
        comment: "roboshop system user"

    - name: Create app directory
      ansible.builtin.file:
        path: /app
        state: directory
        owner: roboshop
        group: roboshop
        mode: '0755'   

    - name: Download the application code
      ansible.builtin.get_url: 
        url: https://roboshop-artifacts.s3.amazonaws.com/dispatch-v3.zip
        dest: /tmp/dispatch.zip

    - name: Unarchive the code
      ansible.builtin.unarchive:
        src: /tmp/dispatch.zip
        dest: /app
        remote_src: yes

    - name: Download Go dependencies
      ansible.builtin.command: go mod tidy
      args:
        chdir: /app    

    - name: Build the application
      ansible.builtin.command: go build
      args:
        chdir: /app

    - name: Copy the dispatch service file
      ansible.builtin.copy:
        src: dispatch.service
        dest: /etc/systemd/system/dispatch.service

    - name: Reload the daemon
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Enable and start the dispatch service
      ansible.builtin.service:
        name: dispatch
        enabled: yes
        state: started        