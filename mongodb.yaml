- name: mongodb configure
  hosts: mongodb
  become: yes
  tasks:
  - name: copy mongo repo
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: install mongodb server
    ansible.builtin.dnf:
      name: mongodb-org
      state: present
  
  - name: allow remote connections
    ansible.builtin.replace:
      path: /etc/mongod.conf
      regexp: '127.0.0.1'
      replace: '0.0.0.0'
    ignore_errors: yes

  - name: Load MongoDB schema
    ansible.builtin.shell: |
      curl -o /tmp/mongodb.zip https://roboshop-artifacts.s3.amazonaws.com/mongodb-v3.zip
      unzip -o /tmp/mongodb.zip -d /tmp
      cd /tmp/mongodb-main
      mongo < catalogue.js
      mongo < users.js  

  - name: start and enable mongodb
    ansible.builtin.service:
      name: mongod
      enabled: yes
      state: started

  # - name: restart mongodb
  #   ansible.builtin.service:
  #     name: mongod
  #     state: restarted