- name: Destroy RoboShop Infrastructure
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    region: us-east-1
    hosted_zone_id: ZXXXXXXXXXXXXX   # 🔥 replace this
    domain: rk1214.in

    components:
      - cart
      - catalogue
      - user
      - shipping
      - payment
      - dispatch
      - frontend
      - mongodb
      - mysql
      - redis
      - rabbitmq

  tasks:

    # 🔍 Get EC2 instances
    - name: Fetch EC2 instances
      amazon.aws.ec2_instance_info:
        region: "{{ region }}"
        filters:
          "tag:Name": "{{ item }}-dev"
          instance-state-name: running
      loop: "{{ components }}"
      register: ec2_info

    # 🧾 Collect instance IDs
    - name: Collect instance IDs
      set_fact:
        instance_ids: "{{ instance_ids | default([]) + item.instances | map(attribute='instance_id') | list }}"
      loop: "{{ ec2_info.results }}"

    # 🗑️ Terminate EC2 instances
    - name: Terminate instances
      amazon.aws.ec2_instance:
        region: "{{ region }}"
        instance_ids: "{{ instance_ids }}"
        state: absent
      when: instance_ids is defined and instance_ids | length > 0

    # 🌐 Fetch Route53 records
    - name: Get Route53 records
      amazon.aws.route53_info:
        hosted_zone_id: "{{ hosted_zone_id }}"
      register: r53_info

    # 🗑️ Delete Route53 records
    - name: Delete DNS records
      amazon.aws.route53:
        state: absent
        zone: "{{ domain }}"
        record: "{{ item }}-dev.{{ domain }}"
        type: A
        ttl: 300
        value: "{{ lookup('vars', 'dummy_ip', default='1.1.1.1') }}"
      loop: "{{ components }}"
      ignore_errors: yes
