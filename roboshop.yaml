  - name: instance creation using ansible
    hosts:  all
    connection: local
    vars:
      sg_id: sg-0eec592803ede7730
      ami_id: ami-0220d79f3f480ecf5
      instances:
      - mongodb
      - catalogue

    tasks: 
    - name: create ec2 instance
      amazon.aws.ec2_instance:
        instance_type: t3.micro
        security_group: "{{ sg_id }}"
        image_id: "{{ ami_id }}"
        name: "{{ item }}"
        tags: 
          Project: roboshop
          Component: "{{ item }}"
          Environment: "{{ env }}"
          Name: "{{ item }}-{{env}}"
      loop: "{{ instances }}"
      register: ec2_output

    - name: print the ec2_output
      ansible.builtin.debug:
      msg: "{{ ec2_output }}"