- name: redis configuration
  hosts: redis
  become: yes

  vars:
    MONGODB_HOST: redis-dev.rk1214.in

  tasks:

  - name: Disable old redis module
    ansible.builtin.command: dnf module disable redis -y
    ignore_errors: yes

  - name: Enable redis:7
    ansible.builtin.command: dnf module enable redis:7 -y

  - name: Install redis
    ansible.builtin.dnf:
      name: redis
      state: present

  - name: Allow remote connections (bind 0.0.0.0)
    ansible.builtin.lineinfile:
      path: /etc/redis.conf
      regexp: '^bind'
      line: 'bind 0.0.0.0'
    ignore_errors: yes
  - name: Disable protected mode
    ansible.builtin.lineinfile:
      path: /etc/redis.conf
      regexp: '^protected-mode'
      line: 'protected-mode no'    

  - name: Start redis service
    ansible.builtin.service:
      name: redis
      enabled: yes
      state: started